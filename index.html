<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 지역별 전력 수급 대시보드</title>
<style>
  :root{--bg:#ffffff;--panel:#ffffff;--panel2:#f4f5f6;--text:#1a1a1a;--muted:#58616a;
    --border:#d5dade;--accent:#256ef4;--good:#0b50d0;--bad:#e53935;--warn:#b26a00;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Pretendard GOV","Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",sans-serif;
    background:#fff;color:#1a1a1a;min-height:100vh;word-break:keep-all;}
  header{padding:16px 26px 0;border-bottom:1px solid var(--border);}
  .htop{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:8px;}
  header h1{margin:0;font-size:20px;font-weight:800;letter-spacing:-.3px;color:var(--text);}
  header p{margin:5px 0 0;color:var(--muted);font-size:12.5px;}
  .updated{font-size:11.5px;color:var(--muted);}
  .tabs{display:flex;gap:4px;margin-top:12px;}
  .tabs button{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);
    padding:9px 16px;font-size:14px;font-weight:700;cursor:pointer;}
  .tabs button.active{color:var(--text);border-bottom-color:var(--accent);}
  .wrap{display:flex;flex-wrap:wrap;gap:18px;padding:16px 26px 40px;align-items:flex-start;}
  .mapcol{flex:1 1 600px;min-width:360px;}
  .sidecol{flex:1 1 360px;min-width:310px;max-width:480px;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;align-items:center;}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:3px;flex-wrap:wrap;}
  .seg button{background:none;border:none;color:var(--muted);padding:8px 12px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;white-space:nowrap;}
  .seg button.active{background:var(--accent);color:#fff;box-shadow:0 2px 10px #256ef455;}
  .seg button:disabled{opacity:.4;cursor:not-allowed;}
  .yearsel{display:inline-flex;gap:4px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:3px;}
  .yearsel button{background:none;border:none;color:var(--muted);padding:7px 11px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:700;}
  .yearsel button.active{background:var(--accent);color:#fff;}
  .fuelsel{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .fuelsel button{background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:6px 11px;border-radius:18px;cursor:pointer;font-size:12.5px;display:flex;align-items:center;gap:6px;transition:.15s;}
  .fuelsel button.active{color:var(--text);background:#eaf1fe;border-color:var(--accent);transform:translateY(-1px);}
  .fuelsel button:disabled{opacity:.35;cursor:not-allowed;}
  .estTag{font-size:10.5px;color:var(--warn);border:1px solid #b26a0055;background:#fff4e0;border-radius:10px;padding:1px 7px;}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block;flex:0 0 auto;}
  .mapbox{position:relative;background:linear-gradient(180deg,#fbfcfd,#eef1f4);border:1px solid var(--border);border-radius:14px;padding:6px;overflow:hidden;}
  svg#map{width:100%;height:calc(100vh - 300px);max-height:900px;min-height:420px;display:block;touch-action:none;cursor:grab;}
  svg#map.grabbing{cursor:grabbing;}
  path.region{stroke:#ffffff;stroke-width:0.8;cursor:pointer;transition:fill .55s cubic-bezier(.4,0,.2,1),opacity .2s,stroke-width .12s;}
  path.region.dim{opacity:.32;} path.region.hl{stroke:#0b50d0;stroke-width:1.8;filter:url(#glow);} path.region.sel{stroke:#0b50d0;stroke-width:2.4;filter:url(#glow);}
  .leader{stroke:#0b50d055;stroke-width:0.7;} .ldot{fill:#0b50d0cc;}
  .rlabel{font-size:10px;fill:#101418;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.8px;stroke-linejoin:round;font-weight:700;}
  .rval{font-size:8.6px;fill:#33414f;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.4px;}
  .rval2{font-size:7.6px;fill:#5a6b7a;pointer-events:none;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.2px;font-weight:600;}
  .rbubble{pointer-events:none;transition:r .55s cubic-bezier(.4,0,.2,1),opacity .3s,fill .3s,stroke .3s;}
  .bub .ldot{display:none;}  /* 버블(절대량) 모드에선 리더 중심점 숨김 — 버블이 위치 표시 */
  .rbar2{pointer-events:none;transition:height .5s cubic-bezier(.4,0,.2,1),y .5s cubic-bezier(.4,0,.2,1),fill .3s;}
  .aidcmode .rlabel,.aidcmode .leader,.aidcmode .ldot,.aidcmode .rval,.aidcmode .rval2{display:none;}  /* AIDC 도시맵: 시도 이름표 숨겨 글씨 충돌 제거 */
  .aidclbl{font-size:8.8px;fill:#16202b;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.4px;font-weight:800;pointer-events:none;}
  .aidlcap{font-size:8px;fill:#3a4654;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:2.2px;font-weight:700;pointer-events:none;}
  .rbartrack{fill:#fff;fill-opacity:.3;stroke:#0000001f;stroke-width:.6;pointer-events:none;}
  .rbarfill{fill:#2b3a47;stroke:#fff;stroke-width:.8;paint-order:stroke;pointer-events:none;transition:width .45s cubic-bezier(.4,0,.2,1);}
  .ovl{position:absolute;display:flex;gap:6px;} .ovl.tl{top:12px;left:12px;} .ovl.tr{top:12px;right:12px;flex-direction:column;align-items:flex-end;}
  .iconbtn{width:30px;height:30px;border-radius:8px;background:#ffffffe6;border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .iconbtn:hover{background:#fff;border-color:var(--accent);color:var(--accent);}
  .hint{background:#ffffffe6;border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .tooltip{position:absolute;pointer-events:none;background:rgba(255,255,255,.97);backdrop-filter:blur(3px);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12.5px;min-width:195px;opacity:0;transition:opacity .1s;z-index:8;box-shadow:0 8px 30px rgba(20,30,50,.18);color:var(--text);}
  .tooltip h4{margin:0 0 6px;font-size:14px;}
  .row{display:flex;justify-content:space-between;gap:14px;line-height:1.55;} .row .nm{display:flex;align-items:center;gap:6px;color:var(--muted);}
  .tot{border-top:1px solid var(--border);margin-top:5px;padding-top:5px;font-weight:800;}
  .legend{display:flex;align-items:center;gap:9px;margin-top:11px;font-size:11.5px;color:var(--muted);}
  .legendbar{flex:1;height:13px;border-radius:7px;border:1px solid #0006;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:15px 17px;margin-bottom:14px;box-shadow:0 4px 16px rgba(20,30,50,.07);}
  .card h3{margin:0 0 11px;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  #detailCard{display:none;}
  .bigval{font-size:30px;font-weight:800;letter-spacing:-.5px;line-height:1;} .bigval small{font-size:14px;color:var(--muted);font-weight:600;margin-left:4px;}
  .balance{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:13px;}
  .balance .bcell{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;}
  .balance .bcell .blab{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .balance .bcell .bval{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px;letter-spacing:-.3px;line-height:1.1;}
  .balance .bcell .bval small{font-size:11px;font-weight:600;color:var(--muted);margin-left:2px;}
  .fbar{display:flex;flex-direction:column;gap:7px;margin-top:12px;} .fbar .frow{display:flex;align-items:center;gap:8px;font-size:12px;}
  .fbar .fname{width:78px;color:var(--muted);display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .fbar .ftrack{flex:1;height:9px;background:#e6eaee;border-radius:5px;overflow:hidden;} .fbar .ffill{height:100%;border-radius:5px;width:0;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .fbar .fval{width:108px;text-align:right;font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .aidc{margin-top:13px;padding:11px 13px;border-radius:10px;font-size:12.5px;line-height:1.55;border:1px solid var(--border);} .aidcgw{font-size:21px;font-weight:800;}
  .natlegend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:10px;font-size:12px;} .natlegend span{display:flex;align-items:center;gap:6px;}
  table.rank{width:100%;border-collapse:collapse;font-size:12.5px;} table.rank td{padding:4px;border-bottom:1px solid var(--border);}
  table.rank tr{cursor:pointer;} table.rank tr:hover td{background:rgba(0,0,0,.035);} table.rank td:last-child{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted);} table.rank tr.selrow td{background:#256ef422;} table.rank tr.hovrow td{background:#256ef41a;box-shadow:inset 2px 0 0 #256ef4;}
  .note{font-size:11.5px;color:var(--muted);line-height:1.65;} .note b{color:var(--warn);}
  a{color:var(--accent);text-decoration:none;} a:hover{text-decoration:underline;}
  .src{font-size:11px;color:var(--muted);line-height:1.7;}
  .badge{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:1px 8px;font-size:11px;color:var(--muted);font-weight:600;}
  /* trend view */
  #trendView{display:none;padding:16px 26px 40px;}
  .trendgrid{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start;}
  .trendmain{flex:1 1 640px;min-width:340px;} .trendside{flex:1 1 300px;min-width:280px;max-width:420px;}
  select.rsel{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:8px 11px;font-size:13px;font-weight:700;}
  svg#chart{width:100%;height:auto;display:block;background:linear-gradient(180deg,#fbfcfd,#eef1f4);border:1px solid var(--border);border-radius:14px;}
  .chartTip{position:absolute;pointer-events:none;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:9px;padding:8px 11px;font-size:12px;opacity:0;transition:opacity .1s;z-index:9;min-width:150px;color:var(--text);box-shadow:0 6px 22px rgba(20,30,50,.16);}
  .err{background:#fdecea;border:1px solid #e5393555;color:#b3261e;padding:14px 16px;border-radius:12px;margin:20px 26px;font-size:14px;}
  /* ===== 모바일 반응형 ===== */
  @media (max-width:680px){
    header{padding:12px 14px 0;}
    header h1{font-size:17px;}
    .tabs{margin-top:9px;}
    .wrap{padding:10px 12px 30px;gap:12px;}
    .mapcol{flex:1 1 100%;min-width:0;}
    .sidecol{flex:1 1 100%;min-width:0;max-width:none;}
    svg#map{height:60vh;min-height:320px;}
    .controls{gap:6px;}
    .seg button,.yearsel button,.fuelsel button,.tabs button{padding:9px 13px;font-size:13.5px;}  /* 터치 타깃 확대 */
    .iconbtn{width:38px;height:38px;font-size:19px;}
    .card{padding:13px 14px;}
    .trendmain,.trendside{flex:1 1 100%;min-width:0;max-width:none;}
    .err{margin:14px;}
  }
</style>
</head>
<body>
<header>
  <div class="htop">
    <div>
      <h1>대한민국 지역별 전력 수급 대시보드</h1>
      <p>시도별 설비·발전·소비로 보는 AIDC 입지 여력 · 출처: 한전 전력통계월보(최신 2026.4)</p>
    </div>
    <div class="updated" id="updated"></div>
  </div>
  <div class="tabs" id="tabs">
    <button data-tab="map" class="active">📍 지도 뷰</button>
    <button data-tab="trend">📈 연도별 추이</button>
  </div>
</header>

<div id="loadErr" class="err" style="display:none;">
  데이터 파일이 아직 없습니다. <b>kepco_wolbo.py</b>를 실행해 <code>wolbo_data.js</code>를 생성하세요.
</div>

<!-- ===================== MAP VIEW ===================== -->
<div class="wrap" id="mapView">
  <div class="mapcol">
    <div class="controls">
      <div class="seg" id="modeSel">
        <button data-mode="capacity" class="active">설비용량 (MW)</button>
        <button data-mode="generation">발전량 (GWh)</button>
        <button data-mode="consumption">소비량 (GWh)</button>
        <button data-mode="selfsuff">수급밸런스 (자급률·과부족)</button>
        <button data-mode="cleanshare">재생E (RE100)</button>
        <button data-mode="aidc_count">AIDC 수용 (개)</button>
        <button data-mode="aidc_status">🏢 AIDC 현황</button>
      </div>
      <div class="yearsel" id="yearSel"></div>
      <div class="fuelsel" id="fuelSel"></div>
      <div class="seg" id="magSel" style="display:none">
        <button data-mag="bar" class="active">▮ 막대</button>
        <button data-mag="circle">⬤ 원</button>
      </div>
    </div>
    <div class="mapbox">
      <svg id="map" viewBox="0 0 600 720" preserveAspectRatio="xMidYMid meet">
        <defs><filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#0b50d0" flood-opacity="0.32"/></filter></defs>
        <rect id="mapbg" x="0" y="0" width="600" height="720" fill="none" pointer-events="all"></rect>
        <g id="vp"><g id="regions"></g><g id="rlabels"></g></g>
      </svg>
      <div class="ovl tl"><button class="iconbtn" id="zin">+</button><button class="iconbtn" id="zout">−</button><button class="iconbtn" id="zreset">⟲</button></div>
      <div class="ovl tr"><div class="hint">휠·두손가락=확대 · 드래그=이동 · 탭=선택</div></div>
      <div class="tooltip" id="tip"></div>
    </div>
    <div class="legend"><span id="legMin">0</span><div class="legendbar" id="legbar"></div><span id="legMax"></span><span id="legUnit" style="margin-left:8px;color:var(--text);font-weight:700;"></span></div>
    <div id="modeFormula" class="note" style="margin:9px 2px 0;font-size:11.5px;line-height:1.6;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;"></div>
  </div>
  <div class="sidecol">
    <div class="card" id="detailCard"><h3 id="dTitle"></h3><div class="bigval" id="dBig"></div><div class="balance" id="dBalance"></div><div class="fbar" id="dBars"></div><div class="aidc" id="dAidc"></div></div>
    <div class="card"><h3 id="rankTitle">지역 순위</h3><div id="rankFormula" class="note" style="display:none;margin:-2px 0 10px;font-size:11.5px;line-height:1.55;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;"></div><table class="rank"><tbody id="rankBody"></tbody></table></div>
    <div class="card"><h3>데이터 한계 · 출처</h3><p class="note" id="limitNote"></p><div class="src" id="srcList" style="margin-top:10px;"></div></div>
  </div>
</div>

<!-- ===================== TREND VIEW ===================== -->
<div id="trendView">
  <div class="trendgrid">
    <div class="trendmain">
      <div class="controls">
        <div class="seg" id="trendMetric">
          <button data-m="overview" class="active">📊 종합 한눈에</button>
          <button data-m="capacity">설비용량 (MW)</button>
          <button data-m="generation">발전량 (GWh)</button>
          <button data-m="consumption">소비량 (GWh)</button>
          <button data-m="selfsuff">자급률 (%)</button>
          <button data-m="surplus">과부족 (GWh)</button>
          <button data-m="cleanshare">재생E (%)</button>
          <button data-m="aidc_count">AIDC수용 (개)</button>
        </div>
        <select class="rsel" id="trendRegion"></select>
        <div class="seg" id="trendVTog">
          <button data-v="single" class="active">지역별</button>
          <button data-v="heatmap">전지역 비교 ▦</button>
        </div>
      </div>
      <div style="position:relative;">
        <svg id="chart" viewBox="0 0 820 460" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="chartTip" id="chartTip"></div>
      </div>
      <div id="trendOverview" style="display:none;"></div>
      <div class="natlegend" id="trendLegend" style="margin-top:12px;"></div>
    </div>
    <div class="trendside">
      <div class="card"><h3 id="trendTitle">연도별 추이</h3><p class="note" id="trendNote"></p></div>
      <div class="card"><h3>최근값 구성</h3><div class="fbar" id="trendBars"></div></div>
      <div class="card"><h3>데이터 한계 · 출처</h3><p class="note" id="trendLimit"></p></div>
    </div>
  </div>
</div>

  function metricVal(metric,region,y){

    if(metric==="capacity"){const cp=CAP(y);return region==="전국"?SHORTS.reduce((a,s)=>a+((cp[s]||{}).total||0),0):((cp[region]||{}).total||0);}
    if(metric==="generation")return g;
    if(metric==="consumption")return c;
    if(metric==="selfsuff")return c>0?g/c*100:0;

        s+=`<text x="${cx.toFixed(1)}" y="${(y-3).toFixed(1)}" font-size="9.5" fill="#3a4450" text-anchor="middle" font-weight="600" opacity="${op(i)}">${ovCompact(v,m.u)}</text>`;
        s+=`<text x="${cx.toFixed(1)}" y="${H-5}" font-size="9.5" fill="#8a949e" text-anchor="middle">${yl(i)}</text>`;});}
    return `<div class="ovcard" data-ovm="${metric}" style="border:1px solid var(--border);border-radius:10px;padding:12px 14px;background:#fff;cursor:pointer;transition:border-color .15s,box-shadow .15s" onmouseover="this.style.borderColor='#256ef4';this.style.boxShadow='0 4px 14px rgba(37,110,244,.12)'" onmouseout="this.style.borderColor='';this.style.boxShadow=''">`+
      `<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:13.5px;color:var(--text);font-weight:700">${m.l}</span><span style="font-size:11px;color:var(--muted)">${m.u}</span></div>`+
      `<div style="display:flex;align-items:baseline;gap:6px;margin-top:3px"><span style="font-size:27px;font-weight:800;color:${m.d?(headV>=0?'#256ef4':'#e53935'):m.c};letter-spacing:-.4px">${(m.d&&headV>=0?'+':'')+ovFmt(headV,m.u)}</span><span style="font-size:11.5px;color:var(--muted);font-weight:600">${OV_LASTFULL}년</span></div>`+
      (OV_PARTIAL?`<div style="font-size:11.5px;color:var(--muted);margin-top:1px">'${String(OV_PY).slice(2)} 누계 <b>${(m.d&&pV>=0?'+':'')+ovFmt(pV,m.u)}</b> <span style="opacity:.75">(${WB.current_months}월까지)</span></div>`:"")+
      `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;margin-top:6px">${s}</svg></div>`;
  }
  function renderOverview(chartEl,legEl,ovEl){
    chartEl.style.display="none";legEl.style.display="none";
    ovEl.style.display="grid";ovEl.style.gridTemplateColumns="repeat(auto-fill,minmax(280px,1fr))";ovEl.style.gap="14px";
    ovEl.innerHTML=OVLIST.map(miniChartHTML).join("");
    ovEl.querySelectorAll(".ovcard").forEach(c=>c.onclick=()=>{tMetric=c.dataset.ovm;renderTrend();});
    document.getElementById("trendTitle").textContent=`${tRegion} · 종합 추이 (${YEARS[0]}~${YEARS[YEARS.length-1]})`;
    document.getElementById("trendNote").innerHTML=`소비·자급률·과부족·재생E·AIDC수용을 <b>한눈에</b>. 큰 숫자=<b>최근 완전연도(${OV_LASTFULL}년)</b>, 막대 위 숫자=연도별 값(k=천). ${OV_PARTIAL?`<b>'${String(OV_PY).slice(2)}*</b>는 ${WB.current_months}월까지 <b>누계(부분연도)</b>라 흐리게 표시 — 완전연도와 직접 비교 주의.`:""} 카드 클릭 시 상세 전환.`;
    document.getElementById("trendLimit").innerHTML=`출처: 한전 전력통계월보(행정구역별). 각 연도 12월 누계, ${WB.current_year}년은 ${WB.current_label}.`;
    const tb=document.getElementById("trendBars");tb.innerHTML="";
    OVLIST.forEach(metric=>{const m=OVMETA[metric],hv=metricVal(metric,tRegion,OV_LASTFULL),row=document.createElement("div");row.className="frow";row.innerHTML=`<div class="fname" style="width:auto;flex:1">${m.l} <span style="color:var(--muted);font-weight:400;font-size:11px">${OV_LASTFULL}</span></div><div class="fval" style="color:${m.d?(hv>=0?'#256ef4':'#e53935'):'var(--text)'}">${(m.d&&hv>=0?'+':'')+ovFmt(hv,m.u)} ${m.u}</div>`;tb.appendChild(row);});
  }
  function renderHeatmap(chartEl,legEl,ovEl){
    chartEl.style.display="none";legEl.style.display="none";
    ovEl.style.display="block";ovEl.style.gridTemplateColumns="";ovEl.style.gap="";
    const metric=(tMetric==="overview")?"generation":tMetric;
    const M=({capacity:{l:"설비용량",u:"MW"},generation:{l:"발전량",u:"GWh"},consumption:{l:"소비량",u:"GWh"},selfsuff:{l:"자급률",u:"%"},surplus:{l:"전력 과부족",u:"GWh"},cleanshare:{l:"재생E(RE100)",u:"%"},aidc_count:{l:"AIDC 수용",u:"개"}})[metric];
    const diverging=(metric==="surplus"||metric==="aidc_count");
    const base=({capacity:"#256ef4",generation:"#ff6b6b",consumption:"#36c9c0",selfsuff:"#256ef4",cleanshare:"#2e9b57"})[metric]||"#256ef4";
    const fv=(v)=>M.u==="%"?Math.round(v)+"%":M.u==="개"?Math.round(v)+"개":fmt(v);
    const li=YEARS.length-1;
    const rows=SHORTS.map(s=>({s,vals:YEARS.map(y=>metricVal(metric,s,y))})).sort((a,b)=>b.vals[li]-a.vals[li]);
    const all=rows.reduce((a,r)=>a.concat(r.vals),[]),maxV=Math.max(1,...all),maxA=Math.max(1,...all.map(Math.abs));
    let html=`<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:12px;font-variant-numeric:tabular-nums"><thead><tr><th style="text-align:left;padding:6px 8px;position:sticky;left:0;background:#fff;z-index:1">시도</th>`;
    html+=YEARS.map(y=>`<th style="padding:6px 6px;text-align:center;color:var(--muted);font-weight:700">'${String(y).slice(2)}</th>`).join("")+`</tr></thead><tbody>`;
    rows.forEach(r=>{
      html+=`<tr class="hmrow" data-s="${r.s}" style="cursor:pointer"><td style="padding:5px 8px;font-weight:700;position:sticky;left:0;background:#fff;white-space:nowrap">${r.s}</td>`;
      r.vals.forEach((v,i)=>{let bg,t;if(diverging){bg=divColor(v,0,maxA);t=Math.abs(v)/maxA;}else{t=maxV>0?v/maxV:0;bg=v>0?seqColor(t,base):"#eef1f4";}
        const txt=(t>0.62)?"#fff":"#1a1a1a";
        html+=`<td title="${r.s} ${YEARS[i]}: ${(diverging&&v>=0?'+':'')+fv(v)} ${M.u}" style="padding:5px 4px;text-align:center;background:${bg};color:${txt};border:1px solid #fff">${(diverging&&v>=0?'+':'')+fv(v)}</td>`;});
      html+=`</tr>`;});
    html+=`</tbody></table></div>`;
    ovEl.innerHTML=html;
    ovEl.querySelectorAll(".hmrow").forEach(tr=>tr.onclick=()=>{tRegion=tr.dataset.s;document.getElementById("trendRegion").value=tRegion;tView="single";renderTrend();});
    document.getElementById("trendTitle").textContent=`전지역 비교 · ${M.l} (${YEARS[0]}~${YEARS[YEARS.length-1]})`;
    document.getElementById("trendNote").innerHTML=`17개 시도 × ${YEARS.length}개 연도 히트맵 · <b>${YEARS[li]} 값순 정렬</b>, 색 진할수록 큼${diverging?"(파랑 잉여/빨강 부족)":""}. 행 클릭 시 해당 지역 상세. 위 지표 버튼으로 항목 전환.`;
    document.getElementById("trendLimit").innerHTML=`출처: 한전 전력통계월보(행정구역별). 단위 ${M.u} · ${WB.current_year}년은 ${WB.current_label}.`;
    const tb=document.getElementById("trendBars");tb.innerHTML="";
    const mxv=Math.max(...rows.map(r=>Math.abs(r.vals[li])))||1;
    rows.slice(0,8).forEach(r=>{const v=r.vals[li],row=document.createElement("div");row.className="frow";const col=diverging?(v>=0?"#256ef4":"#e53935"):base;row.innerHTML=`<div class="fname" style="width:auto;flex:1">${r.s}</div><div class="ftrack"><div class="ffill" style="background:${col}"></div></div><div class="fval">${(diverging&&v>=0?'+':'')+fv(v)}</div>`;tb.appendChild(row);requestAnimationFrame(()=>row.querySelector(".ffill").style.width=(Math.abs(v)/mxv*100)+"%");});
  }
  function renderTrend(){
    document.querySelectorAll("#trendMetric button").forEach(b=>b.classList.toggle("active",b.dataset.m===tMetric));
    document.querySelectorAll("#trendVTog button").forEach(b=>b.classList.toggle("active",b.dataset.v===tView));
    document.getElementById("trendRegion").disabled=(tView==="heatmap");
    const chartEl=document.getElementById("chart"),legEl=document.getElementById("trendLegend"),ovEl=document.getElementById("trendOverview");
    if(tView==="heatmap"){renderHeatmap(chartEl,legEl,ovEl);return;}
    if(tMetric==="overview"){renderOverview(chartEl,legEl,ovEl);return;}
    chartEl.style.display="";legEl.style.display="";if(ovEl)ovEl.style.display="none";
    const stacked=(tMetric==="capacity"||tMetric==="generation"),diverging=(tMetric==="surplus"||tMetric==="aidc_count");
    const years=YEARS,n=years.length,yr0=years[0],yr1=years[n-1];
    const unit=({capacity:"MW",generation:"GWh",consumption:"GWh",selfsuff:"%",surplus:"GWh",cleanshare:"%",aidc_count:"개"})[tMetric];
    const mlabel=({capacity:"설비용량",generation:"발전량",consumption:"소비량",selfsuff:"자급률",surplus:"전력 과부족",cleanshare:"재생E 비중",aidc_count:"AIDC 수용"})[tMetric];
    const fval=(v)=>unit==="%"?Math.round(v)+"%":unit==="개"?Math.round(v)+"개":fmt(v);
    const CW=820,CH=460,mL=64,mR=20,mT=24,mB=46,pw=CW-mL-mR,ph=CH-mT-mB,bw=Math.min(64,pw/Math.max(1,n)*0.62),gap=pw/Math.max(1,n);
    function scalar(y){return metricVal(tMetric,tRegion,y);}
    let svgInner="<defs></defs>";const tb=document.getElementById("trendBars");tb.innerHTML="";
    if(stacked){
      const series=years.map(y=>({y,d:trendSeries(y)})).filter(o=>o.d);
      const totals=series.map(o=>FO.reduce((a,f)=>a+(o.d[f]||0),0)),nice=niceMax(Math.max(1,...totals));
      for(let i=0;i<=5;i++){const v=nice*i/5,gy=mT+ph-(v/nice)*ph;svgInner+=`<line x1="${mL}" y1="${gy.toFixed(1)}" x2="${CW-mR}" y2="${gy.toFixed(1)}" stroke="#e1e5ea" stroke-width="1"/><text x="${mL-8}" y="${(gy+3).toFixed(1)}" fill="#58616a" font-size="11" text-anchor="end">${fmt(v)}</text>`;}
      svgInner+=`<text x="${mL-46}" y="${mT-8}" fill="#58616a" font-size="11">${unit}</text>`;
      series.forEach((o,i)=>{const cx=mL+gap*i+gap/2,x=cx-bw/2;let yacc=mT+ph;
        FO.forEach(f=>{const v=o.d[f]||0,hh=(v/nice)*ph;yacc-=hh;svgInner+=`<rect class="tseg" data-y="${o.y}" x="${x.toFixed(1)}" y="${yacc.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,hh).toFixed(2)}" fill="${FUEL_META[f].color}"></rect>`;});
        svgInner+=`<text x="${cx.toFixed(1)}" y="${CH-mB+18}" fill="#1a1a1a" font-size="12" text-anchor="middle" font-weight="700">${o.y}</text><text x="${cx.toFixed(1)}" y="${(mT+ph-(totals[i]/nice)*ph-6).toFixed(1)}" fill="#1a1a1a" font-size="10.5" text-anchor="middle">${fmt(totals[i])}</text>`;});
      document.getElementById("trendLegend").innerHTML=FO.map(f=>`<span><span class="swatch" style="background:${FUEL_META[f].color}"></span>${FUEL_META[f].label}</span>`).join("");
      const last=series[series.length-1];if(last){const mx=Math.max(...FO.map(f=>last.d[f]||0))||1;FO.forEach(f=>{const v=last.d[f]||0,row=document.createElement("div");row.className="frow";row.innerHTML=`<div class="fname"><span class="swatch" style="background:${FUEL_META[f].color}"></span>${FUEL_META[f].label}</div><div class="ftrack"><div class="ffill" style="background:${FUEL_META[f].color}"></div></div><div class="fval">${fmt(v)}</div>`;tb.appendChild(row);requestAnimationFrame(()=>row.querySelector(".ffill").style.width=(v/mx*100)+"%");});}
    }else{
      const series=years.map(y=>({y,v:scalar(y)})),vals=series.map(o=>o.v);
      const SCOL=({consumption:"#36c9c0",selfsuff:"#256ef4",cleanshare:"#2e9b57"})[tMetric]||"#256ef4";
      if(diverging){
        const maxH=Math.max(0,...vals),minH=Math.min(0,...vals),rng=(maxH-minH)||1,zeroY=mT+(maxH/rng)*ph;
        for(let i=0;i<=4;i++){const v=minH+rng*i/4,gy=mT+ph-((v-minH)/rng)*ph;svgInner+=`<line x1="${mL}" y1="${gy.toFixed(1)}" x2="${CW-mR}" y2="${gy.toFixed(1)}" stroke="#e1e5ea" stroke-width="1"/><text x="${mL-8}" y="${(gy+3).toFixed(1)}" fill="#58616a" font-size="11" text-anchor="end">${fval(v)}</text>`;}
        svgInner+=`<line x1="${mL}" y1="${zeroY.toFixed(1)}" x2="${CW-mR}" y2="${zeroY.toFixed(1)}" stroke="#8a949e" stroke-width="1.2"/><text x="${mL-46}" y="${mT-8}" fill="#58616a" font-size="11">${unit}</text>`;
        series.forEach((o,i)=>{const cx=mL+gap*i+gap/2,x=cx-bw/2,hh=Math.abs(o.v)/rng*ph,y=o.v>=0?zeroY-hh:zeroY,col=o.v>=0?"#256ef4":"#e53935";
          svgInner+=`<rect class="tseg" data-y="${o.y}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,hh).toFixed(2)}" rx="3" fill="${col}"></rect><text x="${cx.toFixed(1)}" y="${CH-mB+18}" fill="#1a1a1a" font-size="12" text-anchor="middle" font-weight="700">${o.y}</text><text x="${cx.toFixed(1)}" y="${(o.v>=0?y-4:y+hh+12).toFixed(1)}" fill="#1a1a1a" font-size="10.5" text-anchor="middle">${(o.v>=0?"+":"")+fval(o.v)}</text>`;});
      }else{
        const nice=niceMax(Math.max(1,...vals));
        for(let i=0;i<=5;i++){const v=nice*i/5,gy=mT+ph-(v/nice)*ph;svgInner+=`<line x1="${mL}" y1="${gy.toFixed(1)}" x2="${CW-mR}" y2="${gy.toFixed(1)}" stroke="#e1e5ea" stroke-width="1"/><text x="${mL-8}" y="${(gy+3).toFixed(1)}" fill="#58616a" font-size="11" text-anchor="end">${fval(v)}</text>`;}
        svgInner+=`<text x="${mL-46}" y="${mT-8}" fill="#58616a" font-size="11">${unit}</text>`;
        if(tMetric==="selfsuff"&&100<=nice){const gy=mT+ph-(100/nice)*ph;svgInner+=`<line x1="${mL}" y1="${gy.toFixed(1)}" x2="${CW-mR}" y2="${gy.toFixed(1)}" stroke="#c62828" stroke-width="1" stroke-dasharray="4 3"/><text x="${CW-mR}" y="${(gy-3).toFixed(1)}" fill="#c62828" font-size="10" text-anchor="end">100% 자급</text>`;}
        series.forEach((o,i)=>{const cx=mL+gap*i+gap/2,x=cx-bw/2,hh=(o.v/nice)*ph,y=mT+ph-hh;
          svgInner+=`<rect class="tseg" data-y="${o.y}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,hh).toFixed(2)}" rx="3" fill="${SCOL}"></rect><text x="${cx.toFixed(1)}" y="${CH-mB+18}" fill="#1a1a1a" font-size="12" text-anchor="middle" font-weight="700">${o.y}</text><text x="${cx.toFixed(1)}" y="${(y-5).toFixed(1)}" fill="#1a1a1a" font-size="10.5" text-anchor="middle">${fval(o.v)}</text>`;});
      }
      document.getElementById("trendLegend").innerHTML=`<span><span class="swatch" style="background:${diverging?"#256ef4":SCOL}"></span>${mlabel} (${unit})</span>`+(diverging?`<span><span class="swatch" style="background:#e53935"></span>부족(−)</span>`:"");
      const mxv=Math.max(...vals.map(Math.abs))||1;
      series.slice().reverse().forEach(o=>{const row=document.createElement("div");row.className="frow";const col=diverging?(o.v>=0?"#256ef4":"#e53935"):SCOL;row.innerHTML=`<div class="fname">${o.y}</div><div class="ftrack"><div class="ffill" style="background:${col}"></div></div><div class="fval">${(diverging&&o.v>=0?"+":"")+fval(o.v)}</div>`;tb.appendChild(row);requestAnimationFrame(()=>row.querySelector(".ffill").style.width=(Math.abs(o.v)/mxv*100)+"%");});
    }
    if(!n)svgInner+=`<text x="${CW/2}" y="${CH/2}" fill="#58616a" font-size="14" text-anchor="middle">데이터 없음</text>`;
    chart.innerHTML=svgInner;
    document.getElementById("trendTitle").textContent=`${tRegion} · ${mlabel} 추이 (${yr0}~${yr1})`;
    document.getElementById("trendNote").innerHTML=`<b>한전 월보 실측</b>(시도×발전원). ${WB.current_year}년은 최신 월보 누계(부분연도)${unit==="%"?"라 비율은 영향 작음":"라 양(量)은 낮게 보임"}.`;
    document.getElementById("trendLimit").innerHTML=`출처: 한전 전력통계월보(행정구역별). 각 연도 12월 누계, ${WB.current_year}년은 ${WB.current_label}.`;
    chart.querySelectorAll(".tseg").forEach(r=>{r.addEventListener("mousemove",e=>{const y=r.dataset.y,box=chart.getBoundingClientRect();let html;
      if(stacked){const o={d:trendSeries(+y)};html=`<b>${y} · ${tRegion}</b><br>`+FO.map(ff=>`<div class="row"><span class="nm"><span class="swatch" style="background:${FUEL_META[ff].color}"></span>${FUEL_META[ff].label}</span><span>${fmt((o.d||{})[ff]||0)}</span></div>`).join("")+`<div class="row tot"><span>합계</span><span>${fmt(FO.reduce((a,x)=>a+((o.d||{})[x]||0),0))}</span></div>`;}
      else{const val=scalar(+y);html=`<b>${y} · ${tRegion}</b><div class="row tot"><span>${mlabel}</span><span>${(diverging&&val>=0?"+":"")+fval(val)}</span></div>`;}
      chartTip.innerHTML=html;chartTip.style.opacity=1;let xx=e.clientX-box.left+14;if(xx>box.width-170)xx-=180;chartTip.style.left=xx+"px";chartTip.style.top=(e.clientY-box.top+10)+"px";});
      r.addEventListener("mouseleave",()=>chartTip.style.opacity=0);});
  }

  function niceMax(v){const e=Math.pow(10,Math.floor(Math.log10(v)));const m=v/e;const nm=m<=1?1:m<=2?2:m<=2.5?2.5:m<=5?5:10;return nm*e;}
  document.querySelectorAll("#trendMetric button").forEach(b=>b.onclick=()=>{tMetric=b.dataset.m;if(tMetric==="overview")tView="single";renderTrend();});
  document.querySelectorAll("#trendVTog button").forEach(b=>b.onclick=()=>{tView=b.dataset.v;if(tView==="heatmap"&&tMetric==="overview")tMetric="generation";renderTrend();});

  /* =================== TABS =================== */
  document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{
    if(b.disabled)return;
    document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("active",x===b));
    const t=b.dataset.tab;
    document.getElementById("mapView").style.display=t==="map"?"flex":"none";
    document.getElementById("trendView").style.display=t==="trend"?"block":"none";
    if(t==="trend")renderTrend();});

  buildTrendRegion();render();
})();
</script>
</body>
